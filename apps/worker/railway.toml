[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm db:generate && pnpm --filter @repo/worker build"
watchPatterns = ["/apps/worker/**", "/packages/**", "pnpm-lock.yaml", "package.json"]

[deploy]
startCommand = "pnpm --filter @repo/worker start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
